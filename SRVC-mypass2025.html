<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to SSRvc | เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-pink: #ffdee9;
            --p-purple: #e0c3fc;
            --p-blue: #caf0f8;
            --p-yellow: #fff9c4;
            --primary-btn: #b597f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Anuphan', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* สร้างพื้นหลังเคลื่อนไหวแบบ Mesh Gradient */
            background: linear-gradient(-45deg, var(--p-pink), var(--p-purple), var(--p-blue), var(--p-yellow));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ตกแต่งวงกลมฟุ้งๆ ด้านหลังเพิ่มความอลังการ */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: white;
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* ดีไซน์กล่องกระจก Glassmorphism */
        .login-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px;
            padding: 3rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.05);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #5d5d5d;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p.subtitle {
            color: #7a7a7a;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px 25px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            outline: none;
            font-size: 1.1rem;
            text-align: center;
            color: #555;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        input[type="password"]:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(224, 195, 252, 0.4);
        }

        .btn-enter {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 20px;
            background: var(--primary-btn);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(181, 151, 246, 0.3);
        }

        .btn-enter:hover {
            transform: scale(1.03);
            background: #a282f0;
            box-shadow: 0 15px 25px rgba(181, 151, 246, 0.4);
        }

        .error-text {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }

        /* เอฟเฟกต์สั่นเมื่อรหัสผิด */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }

        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* เอฟเฟกต์เลือนหายตอนเข้าเว็บ */
        .fade-out {
            opacity: 0;
            transition: 1s ease-in-out;
            pointer-events: none;
        }
    </style>
</head>
<body id="body-wrapper">

    <div class="blob"></div>

    <div class="login-card" id="main-card">
        <h1>อนุสรณ์ SRVC 2025 </h1>
        <p class="subtitle">กรุณากรอกรหัสผ่าน</p>
        
        <div class="input-box">
            <input type="password" id="passInput" placeholder="รหัสผ่าน" onkeypress="checkKey(event)">
            <p id="errorMsg" class="error-text">❌ รหัสผ่านไม่ถูกต้อง ลองอีกครั้ง</p>
        </div>

        <button class="btn-enter" onclick="validate()">เข้าสู่เว็บไซต์</button>
    </div>

    <script>
        const targetUrl = "https://script.google.com/a/macros/srvc.ac.th/s/AKfycbyyLLwckj2I7FNA3MrbB6MyeAp8qBLP8ypi5PmZmYwbM82w7rSLI6UNJ-TqoKXTCnvN/exec";
        const correctPass = "SSRvc2025";

        function validate() {
            const input = document.getElementById('passInput');
            const card = document.getElementById('main-card');
            const error = document.getElementById('errorMsg');
            const body = document.getElementById('body-wrapper');

            if (input.value === correctPass) {
                // เอฟเฟกต์เมื่อรหัสถูกต้อง
                body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 800);
            } else {
                // เอฟเฟกต์เมื่อรหัสผิด
                error.style.display = "block";
                card.classList.add('shake');
                input.value = "";
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }

        function checkKey(e) {
            if (e.key === 'Enter') validate();
        }
    </script>
</body>
</html>
